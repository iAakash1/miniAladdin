# gitleaks configuration — extends the built-in default ruleset.
# https://github.com/gitleaks/gitleaks#configuration

[extend]
useDefault = true

[allowlist]
description = "Known-safe paths and placeholder values"
paths = [
  '''dashboard/package-lock\.json''',
  '''\.env\.example''',
  '''\.env\.vercel\.example''',
]
regexes = [
  # documented placeholders used in example files
  '''your_[a-z_]+_key_here''',
  '''pk_test_PASTE_YOURS_HERE''',
  '''sk_test_PASTE_YOURS_HERE''',
]
